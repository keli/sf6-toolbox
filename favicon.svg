<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="100%" stop-color="#ffd166" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Impact slash for fighting-game feel -->
  <path d="M6 44L44 6h10L16 44z" fill="#ef4444" opacity="0.85"/>

  <!-- SF6 text mark -->
  <text x="8" y="38" font-family="Arial Black, Impact, sans-serif" font-size="23" font-weight="900" fill="url(#accent)">SF</text>
  <text x="39" y="50" font-family="Arial Black, Impact, sans-serif" font-size="22" font-weight="900" fill="#ffffff">6</text>

  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>
</svg>
